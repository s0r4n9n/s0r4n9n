<svg viewBox="0 0 800 650" width="800" height="650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background pattern -->
    <pattern id="bgPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#f5f5dc"/>
      <line x1="0" y1="0" x2="20" y2="20" stroke="rgba(255,192,203,0.3)" stroke-width="1"/>
      <line x1="20" y1="0" x2="0" y2="20" stroke="rgba(173,216,230,0.3)" stroke-width="1"/>
    </pattern>
    
    <!-- Gradient for header -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Rainbow gradient for title -->
    <linearGradient id="rainbowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="16%" style="stop-color:#ff7f00;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#ffff00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#0000ff;stop-opacity:1" />
      <stop offset="83%" style="stop-color:#8b00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow filter for 3D effect -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="4" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Bevel effect for counter -->
    <filter id="bevel">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="0.8" specularExponent="20" lighting-color="#white" result="spec">
        <fePointLight x="-5000" y="-10000" z="20000"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
    
    <!-- Blink animation -->
    <style>
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0.3; }
      }
      .blink { animation: blink 1s infinite; }
      
      @keyframes sparkle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .star1 { animation: sparkle 1s infinite; }
      .star2 { animation: sparkle 1s infinite 0.2s; }
      .star3 { animation: sparkle 1s infinite 0.4s; }
      .star4 { animation: sparkle 1s infinite 0.6s; }
      .star5 { animation: sparkle 1s infinite 0.8s; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgPattern)"/>
  
  <!-- Header box -->
  <rect x="40" y="40" width="720" height="120" fill="url(#headerGrad)" stroke="#ffd700" stroke-width="4"/>
  <rect x="36" y="36" width="728" height="128" fill="none" stroke="#fff" stroke-width="2"/>
  
  <!-- Title -->
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#000" text-anchor="middle" stroke="#000" stroke-width="4">★☆ ようこそ! ☆★</text>
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#rainbowGrad)" text-anchor="middle" stroke="#fff" stroke-width="1">★☆ ようこそ! ☆★</text>
  
  <!-- Subtitle -->
  <text x="400" y="135" font-family="Arial, sans-serif" font-size="18" fill="#ffff00" text-anchor="middle" class="blink">Welcome to my homepage!!</text>
  
  <!-- Stars decoration -->
  <text x="250" y="210" font-size="32" fill="#ffff00" class="star1">★</text>
  <text x="320" y="210" font-size="32" fill="#ffff00" class="star2">☆</text>
  <text x="390" y="210" font-size="32" fill="#ffff00" class="star3">★</text>
  <text x="460" y="210" font-size="32" fill="#ffff00" class="star4">☆</text>
  <text x="530" y="210" font-size="32" fill="#ffff00" class="star5">★</text>
  
  <!-- Counter box -->
  <!-- Main box with 3D effect and drop shadow -->
  <rect x="260" y="230" width="280" height="140" fill="#c0c0c0" stroke="#dfdfdf" stroke-width="4" filter="url(#dropShadow)"/>
  <rect x="257" y="227" width="286" height="146" fill="none" stroke="#fff" stroke-width="3"/>
  <rect x="263" y="233" width="274" height="134" fill="none" stroke="#808080" stroke-width="2"/>
  
  <text x="400" y="265" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000080" text-anchor="middle">👁️ あなたは</text>
  
  <!-- Counter display with more 3D and bevel effect -->
  <rect x="300" y="275" width="200" height="50" fill="#000" stroke="#999" stroke-width="3" filter="url(#bevel)"/>
  <rect x="297" y="272" width="206" height="56" fill="none" stroke="#666" stroke-width="2"/>
  <rect x="303" y="278" width="194" height="44" fill="none" stroke="#00ff00" stroke-width="1" opacity="0.3"/>
  <!-- Glow effect on numbers -->
  <text x="400" y="310" font-family="Courier New, monospace" font-size="32" font-weight="bold" fill="#00ff00" text-anchor="middle" letter-spacing="3" opacity="0.5" filter="url(#dropShadow)">0000001</text>
  <text x="400" y="310" font-family="Courier New, monospace" font-size="32" font-weight="bold" fill="#00ff00" text-anchor="middle" letter-spacing="3">0000001</text>
  
  <text x="400" y="355" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000080" text-anchor="middle">人目の訪問者です！</text>
  
  <!-- Profile box -->
  <rect x="100" y="400" width="600" height="160" fill="#fff" stroke="#000080" stroke-width="2"/>
  <text x="120" y="435" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ff0000">💻 管理人プロフィール</text>
  <text x="120" y="475" font-family="Arial, sans-serif" font-size="20" fill="#000">ユーザー名: s0r4d3v</text>
  <text x="120" y="510" font-family="Arial, sans-serif" font-size="20" fill="#000">職種: 機械学習エンジニア</text>
  <text x="120" y="545" font-family="Arial, sans-serif" font-size="20" fill="#000">好きなもの: ゲーム 🎮</text>
  
  <!-- Footer -->
  <text x="400" y="610" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle" class="blink">Last Update: 2025.01.27</text>
</svg>
