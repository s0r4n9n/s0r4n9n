<svg viewBox="0 0 800 650" width="800" height="650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background pattern -->
    <pattern id="bgPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#f5f5dc"/>
      <line x1="0" y1="0" x2="20" y2="20" stroke="rgba(255,192,203,0.3)" stroke-width="1"/>
      <line x1="20" y1="0" x2="0" y2="20" stroke="rgba(173,216,230,0.3)" stroke-width="1"/>
    </pattern>
    
    <!-- Gradient for header -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Blink animation -->
    <style>
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0.3; }
      }
      .blink { animation: blink 1s infinite; }
      
      @keyframes sparkle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .star1 { animation: sparkle 1s infinite; }
      .star2 { animation: sparkle 1s infinite 0.2s; }
      .star3 { animation: sparkle 1s infinite 0.4s; }
      .star4 { animation: sparkle 1s infinite 0.6s; }
      .star5 { animation: sparkle 1s infinite 0.8s; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgPattern)"/>
  
  <!-- Header box -->
  <rect x="40" y="40" width="720" height="120" fill="url(#headerGrad)" stroke="#ffd700" stroke-width="4"/>
  <rect x="36" y="36" width="728" height="128" fill="none" stroke="#fff" stroke-width="2"/>
  
  <!-- Title -->
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle" stroke="#000" stroke-width="2">★☆ ようこそ! ☆★</text>
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle">★☆ ようこそ! ☆★</text>
  
  <!-- Subtitle -->
  <text x="400" y="135" font-family="Arial, sans-serif" font-size="18" fill="#ffff00" text-anchor="middle" class="blink">Welcome to my homepage!!</text>
  
  <!-- Stars decoration -->
  <text x="250" y="210" font-size="32" fill="#ffff00" class="star1">★</text>
  <text x="320" y="210" font-size="32" fill="#ffff00" class="star2">☆</text>
  <text x="390" y="210" font-size="32" fill="#ffff00" class="star3">★</text>
  <text x="460" y="210" font-size="32" fill="#ffff00" class="star4">☆</text>
  <text x="530" y="210" font-size="32" fill="#ffff00" class="star5">★</text>
  
  <!-- Counter box -->
  <rect x="260" y="230" width="280" height="140" fill="#c0c0c0" stroke="#dfdfdf" stroke-width="3"/>
  <rect x="257" y="227" width="286" height="146" fill="none" stroke="#808080" stroke-width="2"/>
  <rect x="265" y="235" width="270" height="124" fill="none" stroke="#fff" stroke-width="1"/>
  
  <text x="400" y="265" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000080" text-anchor="middle">👁️ あなたは</text>
  
  <!-- Counter display -->
  <rect x="300" y="275" width="200" height="50" fill="#000" stroke="#666" stroke-width="2"/>
  <rect x="297" y="272" width="206" height="56" fill="none" stroke="#999" stroke-width="1"/>
  <text x="400" y="310" font-family="Courier New, monospace" font-size="32" fill="#00ff00" text-anchor="middle" letter-spacing="3">0000001</text>
  
  <text x="400" y="355" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000080" text-anchor="middle">人目の訪問者です！</text>
  
  <!-- Profile box -->
  <rect x="100" y="400" width="600" height="130" fill="#fff" stroke="#000080" stroke-width="2"/>
  <text x="120" y="430" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ff0000">💻 管理人プロフィール</text>
  <text x="120" y="465" font-family="Arial, sans-serif" font-size="16" fill="#000">ユーザー名: s0r4d3v</text>
  <text x="120" y="490" font-family="Arial, sans-serif" font-size="16" fill="#000">職種: 機械学習エンジニア</text>
  <text x="120" y="515" font-family="Arial, sans-serif" font-size="16" fill="#000">好きなもの: ゲーム 🎮</text>
  
  <!-- Footer -->
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle" class="blink">Last Update: 2025.01.27</text>
</svg>
